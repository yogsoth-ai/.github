<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yogsoth AI Banner Prototype</title>
<style>
  * { margin: 0; padding: 0; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .banner {
    width: 800px;
    height: 800px;
  }

  /* Async breathing for each circle — expand = fade, contract = solidify */
  @keyframes breathe1 {
    0%, 100% { stroke-width: 4.5; opacity: 1; }
    50% { stroke-width: 6; opacity: 0.6; }
  }
  @keyframes breathe2 {
    0%, 100% { stroke-width: 4; opacity: 1; }
    50% { stroke-width: 5.5; opacity: 0.55; }
  }
  @keyframes breathe3 {
    0%, 100% { stroke-width: 3.5; opacity: 1; }
    50% { stroke-width: 5; opacity: 0.5; }
  }

  /* Outer mist — appears on expand, fades on contract */
  @keyframes mist1 {
    0%, 100% { stroke-width: 2; opacity: 0; }
    50% { stroke-width: 28; opacity: 0.24; }
  }
  @keyframes mist2 {
    0%, 100% { stroke-width: 2; opacity: 0; }
    50% { stroke-width: 24; opacity: 0.21; }
  }
  @keyframes mist3 {
    0%, 100% { stroke-width: 2; opacity: 0; }
    50% { stroke-width: 20; opacity: 0.18; }
  }

  /* Star twinkle */
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.6; }
  }

  .mist1 {
    animation: mist1 4s ease-in-out infinite;
    filter: url(#blur-mist);
  }
  .mist2 {
    animation: mist2 5.5s ease-in-out infinite;
    filter: url(#blur-mist);
  }
  .mist3 {
    animation: mist3 7s ease-in-out infinite;
    filter: url(#blur-mist);
  }
  .circle1 {
    animation: breathe1 4s ease-in-out infinite;
  }
  .circle2 {
    animation: breathe2 5.5s ease-in-out infinite;
  }
  .circle3 {
    animation: breathe3 7s ease-in-out infinite;
  }

  /* White glow at rest (inhale), fades on exhale */
  @keyframes whiteGlow1 {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0; }
  }
  @keyframes whiteGlow2 {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0; }
  }
  @keyframes whiteGlow3 {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0; }
  }

  /* Color glow on exhale, invisible at rest */
  @keyframes colorGlow1 {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.19; }
  }
  @keyframes colorGlow2 {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.19; }
  }
  @keyframes colorGlow3 {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.19; }
  }

  .white-glow1 {
    animation: whiteGlow1 4s ease-in-out infinite;
    filter: url(#blur1);
  }
  .white-glow2 {
    animation: whiteGlow2 5.5s ease-in-out infinite;
    filter: url(#blur1);
  }
  .white-glow3 {
    animation: whiteGlow3 7s ease-in-out infinite;
    filter: url(#blur1);
  }

  .glow1 {
    animation: colorGlow1 4s ease-in-out infinite;
    filter: url(#blur1);
  }
  .glow2 {
    animation: colorGlow2 5.5s ease-in-out infinite;
    filter: url(#blur2);
  }
  .glow3 {
    animation: colorGlow3 7s ease-in-out infinite;
    filter: url(#blur3);
  }
</style>

      <feGaussianBlur stdDeviation="2.5" result="blur"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
    </filter>
    <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
    </filter>
    <filter id="blur-mist" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
    </filter>
